[project]
name = "scene-reconstruction"
authors = ["Jonas Kälble <jonas.kaelble@de.bosch.com>"]
description = 'Implementation for "Accurate Training Data for Occupancy Map Prediction in Automated Driving Using Evidence Theory" (CVPR 2024)'
platforms = ["linux-64"]
version = "0.1.0"
channels = [
    "nvidia/label/cuda-11.6.2",
    "nvidia/label/cuda-11.6.1",
    "nvidia/label/cuda-11.6.0",
    "conda-forge",
    "pytorch",
]
readme = "README.md"
license = "AGPL-3.0"

[tasks]
# Preprocessing
transmissions-reflections = "python -m scene_reconstruction.cli.main export ./conf default transmissions-reflections"
scene-flow = "python -m scene_reconstruction.cli.main export ./conf default scene-flow"
temporal-accumulation = "python -m scene_reconstruction.cli.main export ./conf default temporal-accumulation"
data-processing = { depends-on = [
    "transmissions-reflections",
    "scene-flow",
    "temporal-accumulation",
] }
# Full dataset (v1.0-trainval, all sweeps). Outputs -> data/nuscenes_extra (symlinked to
# the ARTHUR drive). Resumable: re-running skips frames that already exist.
transmissions-reflections-full = "python -m scene_reconstruction.cli.main export ./conf full transmissions-reflections"
scene-flow-full = "python -m scene_reconstruction.cli.main export ./conf full scene-flow"
temporal-accumulation-full = "python -m scene_reconstruction.cli.main export ./conf full temporal-accumulation"
data-processing-full = { depends-on = [
    "transmissions-reflections-full",
    "scene-flow-full",
    "temporal-accumulation-full",
] }
# Label stages (mini: ./conf default). occupancy-export needs temporal-accumulation;
# occ3d-transfer needs occupancy-export + the Occ3D symlink (see SETUP_L40S.md).
occupancy-export = "python -m scene_reconstruction.cli.main export ./conf default occupancy-export"
occ3d-transfer = "python -m scene_reconstruction.cli.main export ./conf default occ3d-transfer"
box-semantics = "python -m scene_reconstruction.cli.main export ./conf default box-semantics"
ood = "python -m scene_reconstruction.cli.main export ./conf default ood"
labels-core = { depends-on = ["data-processing", "occupancy-export", "occ3d-transfer", "box-semantics"] }
check-labels = "python -m scene_reconstruction.cli.main check ./conf default labels"
# Label stages (full: v1.0-trainval, env-var paths).
occupancy-export-full = "python -m scene_reconstruction.cli.main export ./conf full occupancy-export"
occ3d-transfer-full = "python -m scene_reconstruction.cli.main export ./conf full occ3d-transfer"
box-semantics-full = "python -m scene_reconstruction.cli.main export ./conf full box-semantics"
ood-full = "python -m scene_reconstruction.cli.main export ./conf full ood"
labels-core-full = { depends-on = ["data-processing-full", "occupancy-export-full", "occ3d-transfer-full", "box-semantics-full"] }
# Master one-shot chain (extended as later stages land).
dataset-all = { depends-on = ["labels-core-full"] }
# Evaluation
eval-bba04 = "python -m scene_reconstruction.cli.main eval ./conf bba04 render-lidar-depth"
eval-bba = "python -m scene_reconstruction.cli.main eval ./conf bba render-lidar-depth"
eval-occ3d = "python -m scene_reconstruction.cli.main eval ./conf occ3d render-lidar-depth"
eval-open-occupancy = "python -m scene_reconstruction.cli.main eval ./conf open_occupancy render-lidar-depth"
eval-surround-occ = "python -m scene_reconstruction.cli.main eval ./conf surround_occ render-lidar-depth"
eval-scene-as-occupancy = "python -m scene_reconstruction.cli.main eval ./conf scene_as_occupancy render-lidar-depth"
eval-all = { depends-on = [
    "eval-bba04",
    "eval-bba",
    "eval-occ3d",
    "eval-open-occupancy",
    "eval-surround-occ",
    "eval-scene-as-occupancy",
] }

[dependencies]
python = "3.9.*"
binutils = "*"
cxx-compiler = "*"
git = "*"
gxx = "<12"
libcusolver-dev = "*"
ninja = "*"
numba = "*"
numpy = "<1.24"
opencv = "*"
pip = "*"
cuda = { version = "11.6.*", channel = "nvidia/label/cuda-11.6.0" }
pytorch = { version = "1.12.*", channel = "pytorch" }
pytorch-cuda = { version = "11.6.*", channel = "pytorch" }
torchvision = { version = "*", channel = "pytorch" }
mkl = "2020.0.*"
scipy = "*"

[pypi-dependencies]
scene-reconstruction = { path = ".", editable = true }
einops = "*"
hydra-core = "*"
ipympl = "*"
jupyter = "*"
notebook = "*"
open3d = "*"
polars = "*"
rich = "*"
spconv-cu116 = "*"
typer = "*"
pyarrow = "*"
streamlit = "*"
seaborn = "*"
torchmetrics = "*"
nuscenes-devkit = "*"
kaolin = "~=0.14"

[pypi-options]
index-url = "https://pypi.org/simple"
find-links = [
    { url = "https://nvidia-kaolin.s3.us-east-2.amazonaws.com/torch-1.12.0_cu116.html" },
]
