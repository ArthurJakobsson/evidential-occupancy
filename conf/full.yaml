# Full data generation: the entire nuScenes v1.0-trainval dataset (all LIDAR sweeps).
#
# Paths are NOT hard-coded. They are read from environment variables (set them once in
# paths.env and `source paths.env`):
#   NUSCENES_ROOT        -> the nuScenes dataset root (contains samples/ sweeps/ v1.0-trainval/ ...)
#   NUSCENES_EXTRA_ROOT  -> where generated outputs are written (needs ~1.2 TB, fast local NVMe)
# If unset they fall back to the local ./data symlinks, so this config also works locally.
#
# `missing_only: true` makes every step skip frames whose output already exists, so an
# interrupted run resumes by simply re-running the same command.
#
# scene_offset / num_scenes are normally left at the defaults here and overridden per-GPU by
# scripts/generate_shard.py (see scripts/run_full_multi_gpu.sh and SETUP_L40S.md).
data:
  nuscenes:
    _target_: scene_reconstruction.data.nuscenes.dataset.NuscenesDataset
    data_root: ${oc.env:NUSCENES_ROOT,data/nuscenes}
    version: v1.0-trainval
    key_frames_only: false

volume:
  ego_lower: [-40.0, -40.0, -1.0]
  ego_upper: [40.0, 40.0, 5.4]
  ego_shape: [400, 400, 32]
  spherical_lower: [2.5, 1.3089969389957472, -3.141592653589793] #[0.0, (90 - 15) / 180 * math.pi, -math.pi]
  spherical_upper: [60.0, 2.1816615649929116, 3.141592653589793] #[0.0, (90 + 35) / 180 * math.pi, -math.pi]
  spherical_shape: [600, 100, 720] # voxel size [0.1m, 0.5°, 0.5°]
  lidar_min_distance: 2.5

export:
  transmissions_reflections:
    _target_: scene_reconstruction.occupancy.transmission_reflection.ReflectionTransmissionSpherical
    ds:
      _target_: scene_reconstruction.data.nuscenes.dataset.NuscenesDataset
      data_root: ${oc.env:NUSCENES_ROOT,data/nuscenes}
      extra_data_root: ${oc.env:NUSCENES_EXTRA_ROOT,data/nuscenes_extra}
      version: v1.0-trainval
      key_frames_only: false

    extra_data_root: ${oc.env:NUSCENES_EXTRA_ROOT,data/nuscenes_extra}
    spherical_lower: [2.5, 1.3089969389957472, -3.141592653589793] #[0.0, (90 - 15) / 180 * math.pi, -math.pi]
    spherical_upper: [60.0, 2.1816615649929116, 3.141592653589793] #[0.0, (90 + 35) / 180 * math.pi, -math.pi]
    spherical_shape: [600, 100, 720] # voxel size [0.1m, 0.5°, 0.5°]
    lidar_min_distance: 2.5 # meters
    # voxel_size cartesian = 0.2m
    # voxel_size sperical : 0.1m, 0.5°, 0.5°
    batch_size: 4
    missing_only: true
    scene_offset: 0
    num_scenes: null

  scene_flow:
    _target_: scene_reconstruction.data.nuscenes.scene_flow.SceneFlow
    ds:
      _target_: scene_reconstruction.data.nuscenes.dataset.NuscenesDataset
      data_root: ${oc.env:NUSCENES_ROOT,data/nuscenes}
      extra_data_root: ${oc.env:NUSCENES_EXTRA_ROOT,data/nuscenes_extra}
      version: v1.0-trainval
      key_frames_only: false

    extra_data_root: ${oc.env:NUSCENES_EXTRA_ROOT,data/nuscenes_extra}
    cartesian_lower: [-40.0, -40.0, -1.0]
    cartesian_upper: [40.0, 40.0, 5.4]
    cartesian_shape: [400, 400, 32]
    missing_only: true
    scene_offset: 0
    num_scenes: null

  temporal_accumulation:
    _target_: scene_reconstruction.occupancy.temporal_transmission_and_reflection.TemporalTransmissionAndReflection
    ds:
      _target_: scene_reconstruction.data.nuscenes.dataset.NuscenesDataset
      data_root: ${oc.env:NUSCENES_ROOT,data/nuscenes}
      extra_data_root: ${oc.env:NUSCENES_EXTRA_ROOT,data/nuscenes_extra}
      version: v1.0-trainval
      key_frames_only: false

    extra_data_root: ${oc.env:NUSCENES_EXTRA_ROOT,data/nuscenes_extra}
    missing_only: true
    scene_offset: 0
    num_scenes: null
    frame_accumulation_kwargs:
      icp_alignment: false
      batch_size: 1
      max_num_frames: 50
      max_ego_pose_difference: 20.0
      device: cuda
      num_threads: 8

  # ---- label stages ----
  evidence_export:
    _target_: scene_reconstruction.occupancy.evidence_export.EvidenceExport
    ds:
      _target_: scene_reconstruction.data.nuscenes.dataset.NuscenesDataset
      data_root: ${oc.env:NUSCENES_ROOT,data/nuscenes}
      extra_data_root: ${oc.env:NUSCENES_EXTRA_ROOT,data/nuscenes_extra}
      version: v1.0-trainval
      key_frames_only: true
    extra_data_root: ${oc.env:NUSCENES_EXTRA_ROOT,data/nuscenes_extra}
    p_fn: 0.8
    p_fp: 0.2
    missing_only: true
    scene_offset: 0
    num_scenes: null

  occ3d_transfer:
    _target_: scene_reconstruction.labels.occ3d_transfer.Occ3dTransfer
    ds:
      _target_: scene_reconstruction.data.nuscenes.dataset.NuscenesDataset
      data_root: ${oc.env:NUSCENES_ROOT,data/nuscenes}
      extra_data_root: ${oc.env:NUSCENES_EXTRA_ROOT,data/nuscenes_extra}
      version: v1.0-trainval
      key_frames_only: true
    extra_data_root: ${oc.env:NUSCENES_EXTRA_ROOT,data/nuscenes_extra}
    occ3d_root: ${oc.env:NUSCENES_EXTRA_ROOT,data/nuscenes_extra}
    max_fill_distance_m: null   # null = label every voxel with its nearest Occ3D class
    missing_only: true
    scene_offset: 0
    num_scenes: null

  box_semantics:
    _target_: scene_reconstruction.labels.box_semantics.BoxSemantics
    ds:
      _target_: scene_reconstruction.data.nuscenes.dataset.NuscenesDataset
      data_root: ${oc.env:NUSCENES_ROOT,data/nuscenes}
      extra_data_root: ${oc.env:NUSCENES_EXTRA_ROOT,data/nuscenes_extra}
      version: v1.0-trainval
      key_frames_only: true
    extra_data_root: ${oc.env:NUSCENES_EXTRA_ROOT,data/nuscenes_extra}
    missing_only: true
    scene_offset: 0
    num_scenes: null

  ood:
    _target_: scene_reconstruction.labels.ood_fusion.OodFusion
    ds:
      _target_: scene_reconstruction.data.nuscenes.dataset.NuscenesDataset
      data_root: ${oc.env:NUSCENES_ROOT,data/nuscenes}
      extra_data_root: ${oc.env:NUSCENES_EXTRA_ROOT,data/nuscenes_extra}
      version: v1.0-trainval
      key_frames_only: true
    extra_data_root: ${oc.env:NUSCENES_EXTRA_ROOT,data/nuscenes_extra}
    uncertainty_threshold: 0.6
    novelty_scale: 2.0      # metres; fill_distance/novelty_scale -> [0,1]
    novelty_threshold: 0.5
    num_synthetic_anomalies: 0
    anomaly_radius_vox: 3
    seed_base: 0
    missing_only: true
    scene_offset: 0
    num_scenes: null

  locc_transfer:
    _target_: scene_reconstruction.labels.locc_transfer.LoccTransfer
    ds:
      _target_: scene_reconstruction.data.nuscenes.dataset.NuscenesDataset
      data_root: ${oc.env:NUSCENES_ROOT,data/nuscenes}
      extra_data_root: ${oc.env:NUSCENES_EXTRA_ROOT,data/nuscenes_extra}
      version: v1.0-trainval
      key_frames_only: true
    extra_data_root: ${oc.env:NUSCENES_EXTRA_ROOT,data/nuscenes_extra}
    missing_only: true
    scene_offset: 0
    num_scenes: null

  locc_project:
    _target_: scene_reconstruction.labels.locc_project.LoccProject
    ds:
      _target_: scene_reconstruction.data.nuscenes.dataset.NuscenesDataset
      data_root: ${oc.env:NUSCENES_ROOT,data/nuscenes}
      extra_data_root: ${oc.env:NUSCENES_EXTRA_ROOT,data/nuscenes_extra}
      version: v1.0-trainval
      key_frames_only: true
    extra_data_root: ${oc.env:NUSCENES_EXTRA_ROOT,data/nuscenes_extra}
    # SAN OV-Seg output dir (LOcc step 2) + its vocabulary (see LOCC_SETUP.md)
    seg_root: ${oc.env:LOCC_SEG_ROOT,data/nuscenes_extra/locc_san_seg}
    vocab_file: ${oc.env:LOCC_VOCAB,data/nuscenes_extra/locc_san_seg/vocab.txt}
    missing_only: true
    scene_offset: 0
    num_scenes: null
