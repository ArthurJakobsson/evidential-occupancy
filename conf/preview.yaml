# Fast "preview" config: key-frames only + temporal accumulation limited to the
# first few scenes of nuScenes-mini, so we can sanity-check the occupancy output
# in viser before running the full pipeline on v1.0-trainval.
data:
  nuscenes:
    _target_: scene_reconstruction.data.nuscenes.dataset.NuscenesDataset
    data_root: data/nuscenes
    version: v1.0-mini
    key_frames_only: true

volume:
  ego_lower: [-40.0, -40.0, -1.0]
  ego_upper: [40.0, 40.0, 5.4]
  ego_shape: [400, 400, 32]
  spherical_lower: [2.5, 1.3089969389957472, -3.141592653589793] #[0.0, (90 - 15) / 180 * math.pi, -math.pi]
  spherical_upper: [60.0, 2.1816615649929116, 3.141592653589793] #[0.0, (90 + 35) / 180 * math.pi, -math.pi]
  spherical_shape: [600, 100, 720] # voxel size [0.1m, 0.5°, 0.5°]
  lidar_min_distance: 2.5

export:
  transmissions_reflections:
    _target_: scene_reconstruction.occupancy.transmission_reflection.ReflectionTransmissionSpherical
    ds:
      _target_: scene_reconstruction.data.nuscenes.dataset.NuscenesDataset
      data_root: data/nuscenes
      extra_data_root: data/nuscenes_extra
      version: v1.0-mini
      key_frames_only: true

    extra_data_root: data/nuscenes_extra
    spherical_lower: [2.5, 1.3089969389957472, -3.141592653589793] #[0.0, (90 - 15) / 180 * math.pi, -math.pi]
    spherical_upper: [60.0, 2.1816615649929116, 3.141592653589793] #[0.0, (90 + 35) / 180 * math.pi, -math.pi]
    spherical_shape: [600, 100, 720] # voxel size [0.1m, 0.5°, 0.5°]
    lidar_min_distance: 2.5 # meters
    # voxel_size cartesian = 0.2m
    # voxel_size sperical : 0.1m, 0.5°, 0.5°
    batch_size: 4

  scene_flow:
    _target_: scene_reconstruction.data.nuscenes.scene_flow.SceneFlow
    ds:
      _target_: scene_reconstruction.data.nuscenes.dataset.NuscenesDataset
      data_root: data/nuscenes
      extra_data_root: data/nuscenes_extra
      version: v1.0-mini
      key_frames_only: true

    extra_data_root: data/nuscenes_extra
    cartesian_lower: [-40.0, -40.0, -1.0]
    cartesian_upper: [40.0, 40.0, 5.4]
    cartesian_shape: [400, 400, 32]

  temporal_accumulation:
    _target_: scene_reconstruction.occupancy.temporal_transmission_and_reflection.TemporalTransmissionAndReflection
    ds:
      _target_: scene_reconstruction.data.nuscenes.dataset.NuscenesDataset
      data_root: data/nuscenes
      extra_data_root: data/nuscenes_extra
      version: v1.0-mini
      key_frames_only: true

    extra_data_root: data/nuscenes_extra
    # Only accumulate the first 2 mini scenes for the preview (gives plenty of
    # key-frame samples). Remove this to process every scene.
    scene_offset: 0
    num_scenes: 2
    frame_accumulation_kwargs:
      icp_alignment: false
      batch_size: 1
      max_num_frames: 50
      max_ego_pose_difference: 20.0
      device: cuda
      num_threads: 8

  # ---- label stages (process whatever scenes already have accumulated evidence) ----
  evidence_export:
    _target_: scene_reconstruction.occupancy.evidence_export.EvidenceExport
    ds:
      _target_: scene_reconstruction.data.nuscenes.dataset.NuscenesDataset
      data_root: data/nuscenes
      extra_data_root: data/nuscenes_extra
      version: v1.0-mini
      key_frames_only: true
    extra_data_root: data/nuscenes_extra
    p_fn: 0.8
    p_fp: 0.2
    missing_only: false
    scene_offset: 0
    num_scenes: null

  occ3d_transfer:
    _target_: scene_reconstruction.labels.occ3d_transfer.Occ3dTransfer
    ds:
      _target_: scene_reconstruction.data.nuscenes.dataset.NuscenesDataset
      data_root: data/nuscenes
      extra_data_root: data/nuscenes_extra
      version: v1.0-mini
      key_frames_only: true
    extra_data_root: data/nuscenes_extra
    occ3d_root: data/nuscenes_extra
    max_fill_distance_m: null   # null = label every voxel with its nearest Occ3D class
    missing_only: false
    scene_offset: 0
    num_scenes: null

  box_semantics:
    _target_: scene_reconstruction.labels.box_semantics.BoxSemantics
    ds:
      _target_: scene_reconstruction.data.nuscenes.dataset.NuscenesDataset
      data_root: data/nuscenes
      extra_data_root: data/nuscenes_extra
      version: v1.0-mini
      key_frames_only: true
    extra_data_root: data/nuscenes_extra
    missing_only: false
    scene_offset: 0
    num_scenes: null
